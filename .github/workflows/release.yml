name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write   # PyPI Trusted Publishing

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bump version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"$VERSION\"/" src/htb/__init__.py
          if git diff --quiet; then
            echo "Version already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pyproject.toml src/htb/__init__.py
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git push origin HEAD:main
          fi

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*

      # Requires PyPI Trusted Publishing configured at:
      # https://pypi.org/manage/project/htb-flow/settings/publishing/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
